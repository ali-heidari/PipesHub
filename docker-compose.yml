# PipesHub cluster — 3 nodes, each with an embedded AIxKer agent.
#
# AIxKer forms a self-organizing peer mesh via UDP multicast gossip.
# When a node is overloaded the XDP hook redirects new TCP SYNs to a free
# peer at kernel level — no proxy, no extra hop.
#
# All three nodes share one MongoDB instance for user/unit registry.
#
# Network: macvlan — each container appears as a distinct device on the
# physical LAN (192.168.101.0/24). Change `parent` below to match your
# host NIC (ip link show). Port publishing is not used; reach node-1
# directly at 192.168.101.11:16916 and 192.168.101.11:3000.
#
# Production note: for full XDP NIC-bypass performance, deploy one container
# per physical host using network_mode: host instead of macvlan below.

services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      pipeshub-net:
        ipv4_address: 192.168.101.10

  node-1:
    build: .
    privileged: true          # required for eBPF map access
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    security_opt:
      - seccomp:unconfined    # required for bpf() syscall
    environment:
      MONGO_URI: mongodb://192.168.101.10:27017/pipeshub
      PORT: 16916
      SOCKET_PORT: 3000
    depends_on:
      - mongo
    networks:
      pipeshub-net:
        ipv4_address: 192.168.101.11
    restart: unless-stopped

  node-2:
    build: .
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    security_opt:
      - seccomp:unconfined
    environment:
      MONGO_URI: mongodb://192.168.101.10:27017/pipeshub
      PORT: 16916
      SOCKET_PORT: 3000
    depends_on:
      - mongo
    networks:
      pipeshub-net:
        ipv4_address: 192.168.101.12
    restart: unless-stopped

  node-3:
    build: .
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    security_opt:
      - seccomp:unconfined
    environment:
      MONGO_URI: mongodb://mongo:27017/pipeshub
      PORT: 16916
      SOCKET_PORT: 3000
    depends_on:
      - mongo
    networks:
      pipeshub-net:
        ipv4_address: 192.168.101.13
    restart: unless-stopped

networks:
  pipeshub-net:
    driver: macvlan
    driver_opts:
      parent: wlp3s0            # change to your host NIC name (e.g. enp3s0, ens18)
    ipam:
      config:
        - subnet: 192.168.101.0/24
          ip_range: 192.168.101.0/24
          gateway: 192.168.101.1

volumes:
  mongo_data:
